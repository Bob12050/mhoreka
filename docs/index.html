<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1b2330" />
  <title>モホレカ - Mhoreka</title>
  <script type="module" crossorigin src="/mhoreka/assets/index-vdtetp2W.js"></script>
  <link rel="stylesheet" crossorigin href="/mhoreka/assets/index-Civmubtg.css">
<link rel="manifest" href="/mhoreka/manifest.webmanifest"></head>
<body>
  <div id="app">
    <!-- マップ画面 -->
    <canvas id="map"></canvas>

    <!-- サウンド切替 -->
    <button id="sound-toggle" class="icon-btn" aria-label="サウンド切替">🔊</button>

    <!-- 上部HUD -->
    <header id="hud">
      <div class="hud-item">⚔️ <span id="atk-val">14</span></div>
      <div class="hud-item">🛡️ <span id="def-val">0</span></div>
      <div class="hud-item">🎒 <span id="materials">0</span></div>
      <div class="hud-item" id="kills-item" title="長押しでセーブをリセット">🏆 <span id="kills">0</span></div>
      <div class="hud-item">❤️ <span id="player-hp-text">100/100</span></div>
    </header>

    <!-- 現在のエリア（タップでマップ選択） -->
    <button id="area-banner"><span id="area-emoji">🌿</span> <span id="area-name">始まりの森</span> ▾</button>

    <!-- 受注中クエスト（タップでクエストボード） -->
    <button id="quest-banner" class="hidden"></button>

    <!-- マップ操作ヒント -->
    <div id="map-hint">タップした方向にハンターが移動します。モンスターに近づくと戦闘開始！</div>

    <!-- 装備ボタン -->
    <button id="equip-btn" class="panel-btn">🛠️ 装備・生産</button>

    <!-- クエストボード -->
    <button id="quest-toggle" class="corner-btn stack-left">📜 クエスト</button>
    <div id="quests" class="hidden">
      <div class="dex-head">
        <span>クエスト</span>
        <button id="quest-close" aria-label="閉じる">✕</button>
      </div>
      <div id="quest-body"></div>
    </div>

    <!-- 出現中モンスター一覧 -->
    <button id="list-toggle" class="corner-btn">📋 出現中</button>
    <div id="monster-list" class="hidden">
      <div class="list-head">
        <span>出現中のモンスター</span>
        <button id="list-close" aria-label="閉じる">✕</button>
      </div>
      <ul id="list-body"></ul>
    </div>

    <!-- 討伐図鑑 -->
    <button id="dex-toggle" class="corner-btn corner-right">📖 図鑑</button>
    <div id="dex" class="hidden">
      <div class="dex-head">
        <span>討伐図鑑 <small id="dex-rate"></small></span>
        <button id="dex-close" aria-label="閉じる">✕</button>
      </div>
      <ul id="dex-body"></ul>
    </div>

    <!-- マップ選択 -->
    <div id="area-select" class="hidden">
      <div class="dex-head">
        <span>マップ選択</span>
        <button id="area-close" aria-label="閉じる">✕</button>
      </div>
      <ul id="area-body"></ul>
    </div>

    <!-- 装備・生産 -->
    <div id="equip" class="hidden">
      <div class="dex-head">
        <span>装備・生産</span>
        <button id="equip-close" aria-label="閉じる">✕</button>
      </div>
      <div id="equip-tabs">
        <button class="tab-btn active" data-tab="weapon">⚔️ 武器</button>
        <button class="tab-btn" data-tab="armor">🛡️ 防具</button>
        <button class="tab-btn" data-tab="mats">🎒 素材</button>
      </div>
      <div id="equip-body"></div>
    </div>

    <!-- 戦闘オーバーレイ -->
    <div id="battle" class="hidden">
      <button id="retreat-btn">🏳️ リタイア</button>
      <div id="battle-monster">
        <div id="monster-emoji">🐉</div>
        <div id="weak-point" class="hidden">🎯 弱点露出！</div>
        <div id="monster-name">大型モンスター</div>
        <div id="monster-weak"></div>
        <div class="bar"><div id="monster-hp" class="bar-fill mon"></div></div>
        <div id="monster-telegraph" class="hidden">⚠️ 攻撃が来る！</div>
      </div>

      <div id="battle-player">
        <div class="bar"><div id="battle-player-hp" class="bar-fill ply"></div></div>
        <div id="hunter-emoji">🧍</div>
      </div>

      <div id="battle-controls">
        <button id="dodge-btn" class="act-btn dodge">回避</button>
        <button id="attack-btn" class="act-btn attack">攻撃</button>
      </div>

      <div id="battle-log"></div>
    </div>

    <!-- 結果トースト -->
    <div id="toast" class="hidden"></div>
  </div>

</body>
</html>
